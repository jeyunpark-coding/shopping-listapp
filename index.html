<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .app {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #4f8ef7, #7c5cfc);
      padding: 28px 24px 20px;
      color: #fff;
    }

    .header h1 { font-size: 1.6rem; font-weight: 700; }
    .header .stats { font-size: 0.85rem; margin-top: 4px; opacity: 0.85; }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 20px 20px 12px;
      border-bottom: 1px solid #f0f0f0;
    }

    .input-area input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-area input:focus { border-color: #4f8ef7; }

    .input-area button {
      padding: 10px 18px;
      background: #4f8ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .input-area button:hover { background: #3a7be0; }

    .filter-bar {
      display: flex;
      gap: 6px;
      padding: 10px 20px;
      border-bottom: 1px solid #f0f0f0;
    }

    .filter-bar button {
      padding: 5px 14px;
      border: 1.5px solid #dde1e7;
      border-radius: 20px;
      background: #fff;
      font-size: 0.82rem;
      cursor: pointer;
      color: #666;
      transition: all 0.15s;
    }

    .filter-bar button.active {
      background: #4f8ef7;
      border-color: #4f8ef7;
      color: #fff;
      font-weight: 600;
    }

    .list {
      list-style: none;
      padding: 8px 0;
      min-height: 60px;
      max-height: 420px;
      overflow-y: auto;
    }

    .list:empty::after {
      content: '아이템을 추가해 보세요!';
      display: block;
      text-align: center;
      color: #bbb;
      padding: 32px 0;
      font-size: 0.9rem;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      border-bottom: 1px solid #f5f5f5;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .item:last-child { border-bottom: none; }

    .item input[type="checkbox"] {
      width: 20px; height: 20px;
      accent-color: #4f8ef7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      transition: all 0.2s;
    }

    .item.checked .item-text {
      text-decoration: line-through;
      color: #aaa;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      line-height: 1;
    }

    .delete-btn:hover { color: #e05252; background: #fff0f0; }

    .footer {
      padding: 12px 20px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer span { font-size: 0.82rem; color: #999; }

    .clear-btn {
      background: none;
      border: none;
      font-size: 0.82rem;
      color: #e05252;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s;
    }

    .clear-btn:hover { background: #fff0f0; }
    .clear-btn:disabled { color: #ccc; cursor: default; background: none; }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>🛒 쇼핑 리스트</h1>
      <div class="stats" id="stats">0개 중 0개 완료</div>
    </div>

    <div class="input-area">
      <input type="text" id="itemInput" placeholder="아이템 이름 입력..." maxlength="60">
      <button onclick="addItem()">추가</button>
    </div>

    <div class="filter-bar">
      <button class="active" onclick="setFilter('all', this)">전체</button>
      <button onclick="setFilter('active', this)">미완료</button>
      <button onclick="setFilter('done', this)">완료</button>
    </div>

    <ul class="list" id="list"></ul>

    <div class="footer">
      <span id="footerInfo"></span>
      <button class="clear-btn" id="clearBtn" onclick="clearDone()">완료 항목 삭제</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://quasqoaylizmfnijygxy.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF1YXNxb2F5bGl6bWZuaWp5Z3h5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4MTkxMzIsImV4cCI6MjA4OTM5NTEzMn0.90bGrsRnASNtPHWFgn91KGfEDMapdXlyW4Iba0Ud91U';
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let items = [];
    let filter = 'all';

    const input = document.getElementById('itemInput');
    input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });
      if (!error) {
        items = data;
        render();
      }
    }

    async function addItem() {
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, checked: false })
        .select()
        .single();
      if (!error) {
        items.push(data);
        render();
      }
    }

    async function toggleItem(id) {
      const item = items.find(i => i.id === id);
      if (!item) return;
      const { error } = await db
        .from('shopping_items')
        .update({ checked: !item.checked })
        .eq('id', id);
      if (!error) {
        item.checked = !item.checked;
        render();
      }
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);
      if (!error) {
        items = items.filter(i => i.id !== id);
        render();
      }
    }

    async function clearDone() {
      const doneIds = items.filter(i => i.checked).map(i => i.id);
      if (!doneIds.length) return;
      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', doneIds);
      if (!error) {
        items = items.filter(i => !i.checked);
        render();
      }
    }

    function setFilter(f, btn) {
      filter = f;
      document.querySelectorAll('.filter-bar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const doneCount = items.filter(i => i.checked).length;
      const total = items.length;

      document.getElementById('stats').textContent = `${total}개 중 ${doneCount}개 완료`;
      document.getElementById('footerInfo').textContent = `총 ${total}개`;

      const clearBtn = document.getElementById('clearBtn');
      clearBtn.disabled = doneCount === 0;

      const visible = items.filter(i => {
        if (filter === 'active') return !i.checked;
        if (filter === 'done') return i.checked;
        return true;
      });

      list.innerHTML = '';
      visible.forEach(item => {
        const li = document.createElement('li');
        li.className = 'item' + (item.checked ? ' checked' : '');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.onchange = () => toggleItem(item.id);

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const btn = document.createElement('button');
        btn.className = 'delete-btn';
        btn.textContent = '✕';
        btn.title = '삭제';
        btn.onclick = () => deleteItem(item.id);

        li.append(cb, span, btn);
        list.appendChild(li);
      });
    }

    loadItems();
  </script>
</body>
</html>
